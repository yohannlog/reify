name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt-in to Node.js 24 early to suppress deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features -p reify -p reify-core -p reify-macros -p reify-postgres -p reify-mysql -p reify-sqlite

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: cargo build
        run: cargo build --all-features

  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: cargo test (unit)
        # timestamps.rs is excluded — it references unstable features not yet stabilised
        # builder_type_safety is excluded — trybuild tests run in a dedicated job
        run: >
          cargo test -p reify
          --test array_types
          --test audit_tests
          --test batch_upsert
          --test computed_columns
          --test cursor_pagination
          --test derive_enum
          --test derive_table
          --test distinct
          --test func_tests
          --test group_by
          --test migration_tests
          --test range_types
          --test relations
          --test sql_injection
          --test subquery

  compile-fail-tests:
    name: Compile-fail Tests (trybuild)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (compile-fail)
        run: cargo test -p reify --test builder_type_safety
        timeout-minutes: 15

  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Run tarpaulin
        run: >
          cargo tarpaulin
          --all-features
          --workspace
          --exclude reify-macros
          --timeout 120
          --out xml
          --output-dir coverage/
          --exclude-files "reify/tests/compile_fail/*"
          --exclude-files "reify/tests/builder_type_safety.rs"
          --test array_types
          --test audit_tests
          --test batch_upsert
          --test computed_columns
          --test cursor_pagination
          --test derive_enum
          --test derive_table
          --test distinct
          --test func_tests
          --test group_by
          --test migration_tests
          --test range_types
          --test relations
          --test sql_injection
          --test subquery
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reify
          POSTGRES_PASSWORD: reify
          POSTGRES_DB: reify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reify -d reify_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: reify
          MYSQL_DATABASE: reify_test
          MYSQL_USER: reify
          MYSQL_PASSWORD: reify
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u reify -preify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_URL: postgres://reify:reify@localhost:5432/reify_test
      MYSQL_URL: mysql://reify:reify@localhost:3306/reify_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (integration)
        run: cargo test -p reify --features integration-tests --test integration -- --test-threads=1

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt-in to Node.js 24 early to suppress deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --all-features -p reify -p reify-core -p reify-macros -p reify-postgres -p reify-mysql -p reify-sqlite

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: cargo build
        run: cargo build --all-features

  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: cargo test (unit)
        # The list of unit-test binaries lives in
        # `scripts/run-unit-tests.sh`, so adding a new file under
        # `reify/tests/` is automatically picked up by CI without
        # having to edit this workflow. Exclusions (integration,
        # trybuild, timestamps) are documented in the script.
        run: bash scripts/run-unit-tests.sh

  compile-fail-tests:
    name: Compile-fail Tests (trybuild)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (compile-fail)
        run: cargo test -p reify --test builder_type_safety
        timeout-minutes: 15

  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Run tarpaulin
        # Discover the `--test <name>` list from the shared script
        # (keeps CI and local runs in sync).
        run: |
          TESTS="$(
              for f in reify/tests/*.rs; do
                  name="$(basename "$f" .rs)"
                  case "$name" in
                      builder_type_safety|integration|timestamps) ;;
                      *) echo "--test $name" ;;
                  esac
              done | tr '\n' ' '
          )"
          cargo tarpaulin \
              --all-features \
              --workspace \
              --exclude reify-macros \
              --timeout 120 \
              --out xml \
              --output-dir coverage/ \
              --exclude-files "reify/tests/compile_fail/*" \
              --exclude-files "reify/tests/builder_type_safety.rs" \
              $TESTS
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reify
          POSTGRES_PASSWORD: reify
          POSTGRES_DB: reify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reify -d reify_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: reify
          MYSQL_DATABASE: reify_test
          MYSQL_USER: reify
          MYSQL_PASSWORD: reify
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u reify -preify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_URL: postgres://reify:reify@localhost:5432/reify_test
      MYSQL_URL: mysql://reify:reify@localhost:3306/reify_test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Fail fast if the connection strings haven't been wired up —
      # otherwise every test would silently `return` via `connect()`'s
      # `None` branch and the job would pass without actually running
      # anything.
      - name: Verify DB URLs are set
        run: |
          if [[ -z "${PG_URL:-}" ]]; then
              echo "::error::PG_URL is not set" && exit 1
          fi
          if [[ -z "${MYSQL_URL:-}" ]]; then
              echo "::error::MYSQL_URL is not set" && exit 1
          fi
          echo "PG_URL and MYSQL_URL are both set."
      # Tables are now prefixed per-file (`pg_basic_*`, `pg_mig_*`,
      # `mysql_basic_*`, `mysql_mig_*`, …), but `--test-threads=1` is
      # kept as a belt-and-braces safety net: PG catalogue locks for
      # DDL can still serialise badly under heavy parallelism.
      - name: cargo test (integration)
        run: cargo test -p reify --features integration-tests --test integration -- --test-threads=1

name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: Minimal code snippet or steps

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      placeholder: rustc --version
    validations:
      required: true

  - type: dropdown
    id: db-backend
    attributes:
      label: Database Backend
      options:
        - PostgreSQL
        - MySQL/MariaDB
        - SQLite
        - N/A
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, macOS 14"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
    validations:
      required: false

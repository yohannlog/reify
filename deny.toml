[graph]
targets = []
all-features = true

# ── Advisories (cargo audit equivalent) ──────────────────────────────────────
[advisories]
version = 2
# Deny crates with known security vulnerabilities
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

# Advisories ignored because they are transitive deps we don't control
# and no safe upgrade is available upstream.
#
# Tracking:
#   Each ignored advisory MUST have a GitHub issue linked below and MUST be
#   re-evaluated whenever the affected dependency releases a new version.
#   Run `cargo deny check advisories` in CI to surface new advisories.
ignore = [
  # rustls-pemfile is unmaintained (RUSTSEC-2025-0134), pulled in transitively
  # by mysql_async → rustls-* stack. No fix available until mysql_async migrates
  # to rustls-pki-types / a maintained PEM parser.
  #
  # Tracking issue:
  #   https://github.com/yohann-catherine/reify/issues/RUSTSEC-2025-0134
  # Upstream:
  #   https://github.com/blackbeam/mysql_async/issues (watch for a release
  #   that bumps rustls and drops rustls-pemfile)
  #
  # Remove this entry as soon as `cargo tree -i rustls-pemfile` reports the
  # crate is no longer in the graph.
  "RUSTSEC-2025-0134",
]

# ── Licenses ─────────────────────────────────────────────────────────────────
[licenses]
version = 2
# Accept any OSI-approved license (covers MIT, Apache-2.0, BSD-*, ISC, Zlib,
# Unicode-*, CC0-1.0 and all their SPDX compound expressions like "Apache-2.0 OR MIT").
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
]
# Confidence threshold for license detection (0.0–1.0)
confidence-threshold = 0.8

# ── Bans (duplicate dependencies) ────────────────────────────────────────────
[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "deny"
# Deny crates known to be problematic
deny = []
# Skip duplicate-version checks for crates where it's unavoidable
skip = []
skip-tree = []

# ── Sources ──────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io and this workspace
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
